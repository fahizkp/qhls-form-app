name: Deploy to Production

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  CLIENT_IMAGE_NAME: qhls-client
  SERVER_IMAGE_NAME: qhls-server

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Client image
        uses: docker/build-push-action@v4
        with:
          context: ./client
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.CLIENT_IMAGE_NAME }}:latest
          # REACT_APP_API_URL is defaults to empty string in Dockerfile, so we don't need to pass it
          # unless we want to set it explicitly.

      - name: Build and push Server image
        uses: docker/build-push-action@v4
        with:
          context: ./server
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.SERVER_IMAGE_NAME }}:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Copy compose file to server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.deploy.yml"
          target: "/srv/apps/qhls-form-app/"

      - name: Deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            mkdir -p /srv/apps/qhls-form-app
            cd /srv/apps/qhls-form-app
            mv docker-compose.deploy.yml docker-compose.yml
            
            # Create .env file for secrets
            echo "DOMAIN_NAME=${{ secrets.DOMAIN_NAME }}" > .env
            echo "SPREADSHEET_ID=${{ secrets.SPREADSHEET_ID }}" >> .env
            echo "GOOGLE_SERVICE_ACCOUNT_EMAIL=${{ secrets.GOOGLE_SERVICE_ACCOUNT_EMAIL }}" >> .env
            # Handle multiline private key safely
            echo "GOOGLE_PRIVATE_KEY=\"${{ secrets.GOOGLE_PRIVATE_KEY }}\"" >> .env
            
            # Pull latest images
            docker-compose pull
            
            # Start services
            docker-compose up -d --remove-orphans
            
            # Cleanup unused images
            docker image prune -f
