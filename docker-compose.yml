services:
  backend:
    image: ghcr.io/fahizkp/qhls-backend:latest
    container_name: qhls-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=5000
      - CORS_ORIGIN=https://qhls.wisdommlpe.site
    networks:
      - web
      - qhls-internal
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=web"
      - "traefik.http.routers.qhls-backend.rule=Host(`qhls.wisdommlpe.site`) && PathPrefix(`/api`, `/admin`)"
      - "traefik.http.routers.qhls-backend.entrypoints=websecure"
      - "traefik.http.routers.qhls-backend.tls=true"
      - "traefik.http.routers.qhls-backend.tls.certresolver=myresolver"
      - "traefik.http.services.qhls-backend.loadbalancer.server.port=5000"

  frontend:
    image: ghcr.io/fahizkp/qhls-frontend:latest
    container_name: qhls-frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - web
      - qhls-internal
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=web"
      - "traefik.http.routers.qhls-frontend.rule=Host(`qhls.wisdommlpe.site`)"
      - "traefik.http.routers.qhls-frontend.entrypoints=websecure"
      - "traefik.http.routers.qhls-frontend.tls=true"
      - "traefik.http.routers.qhls-frontend.tls.certresolver=myresolver"
      - "traefik.http.services.qhls-frontend.loadbalancer.server.port=80"

networks:
  web:
    external: true
  qhls-internal:
